<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>З Днем Батька, тату! 💙</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-texture"></div>
  <div class="floating-hearts" aria-hidden="true"></div>

  <!-- Envelope intro -->
  <section id="intro" class="intro">
    <p class="intro-greeting">З Днем Батька</p>
    <p class="intro-hint">Натисни на конверт</p>
    <button class="envelope-wrapper" id="envelope" aria-label="Відкрити конверт">
      <div class="envelope">
        <div class="envelope-back"></div>
        <div class="envelope-flap"></div>
        <div class="envelope-front"></div>
        <div class="envelope-heart">💙</div>
      </div>
    </button>
  </section>

  <!-- Photo gallery -->
  <section id="gallery" class="gallery hidden">
    <header class="gallery-header">
      <h1>Спогади з тобою, тату</h1>
      <p class="gallery-subtitle">Гортай фото · натисни, щоб перевернути</p>
    </header>

    <div class="carousel-container">
      <button class="nav-btn nav-prev" id="prevBtn" aria-label="Попереднє фото">‹</button>

      <div class="carousel-track" id="carouselTrack">
        <!-- Polaroids injected by JS -->
      </div>

      <button class="nav-btn nav-next" id="nextBtn" aria-label="Наступне фото">›</button>
    </div>

    <div class="dots" id="dots"></div>
    <p class="photo-counter" id="counter"></p>
  </section>

  <script src="script.js"></script>
</body>
</html>
